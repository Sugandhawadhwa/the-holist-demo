class SoundEngine{
constructor(){this.ctx=null;this.master=null;this.nodes=[];this.oscs=[];this.cur=null;this.timers=[]}
init(){if(this.ctx)return;this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.master=this.ctx.createGain();this.master.gain.value=0;this.master.connect(this.ctx.destination)}
_cleanup(){this.nodes.forEach(n=>{try{n.stop?.()}catch(e){}try{n.disconnect()}catch(e){}});this.oscs.forEach(o=>{try{o.stop?.()}catch(e){}try{o.disconnect()}catch(e){}});this.nodes=[];this.oscs=[];this.timers.forEach(clearTimeout);this.timers=[]}
stop(){if(!this.ctx)return;const now=this.ctx.currentTime;this.master.gain.setValueAtTime(this.master.gain.value,now);this.master.gain.linearRampToValueAtTime(0,now+1);const c=this.cur;this.cur=null;setTimeout(()=>{if(!this.cur)this._cleanup()},1200)}

({Rain:()=>this._rain(),Forest:()=>this._forest(),Ocean:()=>this._ocean(),Static:()=>this._static()})[type]();
this.master.gain.linearRampToValueAtTime(.3,this.ctx.currentTime+2)}
_noiseBuf(type){const len=4*this.ctx.sampleRate,buf=this.ctx.createBuffer(2,len,this.ctx.sampleRate);
for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
if(type==='pink'){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926}}
else{let l=0;for(let i=0;i<len;i++){d[i]=(l+.02*(Math.random()*2-1))/1.02;l=d[i];d[i]*=3.5}}}return buf}
_noise(type,vol){const s=this.ctx.createBufferSource();s.buffer=this._noiseBuf(type);s.loop=true;const g=this.ctx.createGain();g.gain.value=vol;s.connect(g);g.connect(this.master);s.start();this.nodes.push(s,g);return{src:s,gain:g}}
_filter(nd,filters){nd.src.disconnect();let chain=nd.src;filters.forEach(f=>{const ft=this.ctx.createBiquadFilter();ft.type=f.type;ft.frequency.value=f.freq;if(f.q)ft.Q.value=f.q;chain.connect(ft);chain=ft;this.nodes.push(ft)});chain.connect(nd.gain)}
_lfo(target,freq,amount){const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=freq;const g=this.ctx.createGain();g.gain.value=amount;o.connect(g);g.connect(target);o.start();this.oscs.push(o);this.nodes.push(g)}
_rain(){const base=this._noise('pink',.5);this._filter(base,[{type:'lowpass',freq:4200},{type:'highpass',freq:250}]);const patter=this._noise('pink',.1);this._filter(patter,[{type:'bandpass',freq:3200,q:.5},{type:'highpass',freq:1800}]);this._lfo(patter.gain.gain,.08,.04);const deep=this._noise('brown',.08);this._filter(deep,[{type:'lowpass',freq:220}])}
_forest(){const wind=this._noise('pink',.22);this._filter(wind,[{type:'bandpass',freq:700,q:.3},{type:'lowpass',freq:1800}]);this._lfo(wind.gain.gain,.1,.07);const leaves=this._noise('pink',.05);this._filter(leaves,[{type:'bandpass',freq:4200,q:.4},{type:'highpass',freq:2800}]);this._lfo(leaves.gain.gain,.17,.025);
[{base:1400,int:[5000,12000],dur:1.2},{base:1900,int:[7000,16000],dur:.9},{base:2400,int:[9000,20000],dur:1.5}].forEach((b,idx)=>{const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=b.base;const g=this.ctx.createGain();g.gain.value=0;o.connect(g);g.connect(this.master);o.start();this.oscs.push(o);this.nodes.push(g);
const chirp=()=>{if(this.cur!=='Forest')return;const now=this.ctx.currentTime,f=b.base*(.95+Math.random()*.1),f2=f*(1.05+Math.random()*.15);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.009,now+.3);g.gain.linearRampToValueAtTime(.013,now+.5);g.gain.linearRampToValueAtTime(.006,now+.8);g.gain.linearRampToValueAtTime(0,now+b.dur);o.frequency.setValueAtTime(f,now);o.frequency.linearRampToValueAtTime(f2,now+.4);o.frequency.linearRampToValueAtTime(f*.98,now+b.dur);this.timers.push(setTimeout(chirp,b.int[0]+Math.random()*(b.int[1]-b.int[0])))};this.timers.push(setTimeout(chirp,2000+idx*3000+Math.random()*4000))})}
_ocean(){const deep=this._noise('brown',.4);this._filter(deep,[{type:'lowpass',freq:320}]);const surge=this._noise('pink',.18);this._filter(surge,[{type:'lowpass',freq:650},{type:'highpass',freq:80}]);this._lfo(surge.gain.gain,.06,.14);const foam=this._noise('pink',.035);this._filter(foam,[{type:'highpass',freq:3200},{type:'lowpass',freq:6500}]);this._lfo(foam.gain.gain,.06,.025);const s2=this._noise('pink',.07);this._filter(s2,[{type:'lowpass',freq:480},{type:'highpass',freq:60}]);this._lfo(s2.gain.gain,.045,.05)}
_static(){const core=this._noise('pink',.32);this._filter(core,[{type:'lowpass',freq:2600},{type:'highpass',freq:120}]);const warm=this._noise('brown',.08);this._filter(warm,[{type:'lowpass',freq:280}]);this._lfo(core.gain.gain,.3,.018);const cr=this._noise('pink',0);cr.src.disconnect();const bp=this.ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2000;bp.Q.value=2;const cg=this.ctx.createGain();cg.gain.value=0;cr.src.connect(bp);bp.connect(cg);cg.connect(this.master);this.nodes.push(bp,cg);const pop=()=>{if(this.cur!=='Static')return;const now=this.ctx.currentTime;cg.gain.setValueAtTime(0,now);cg.gain.linearRampToValueAtTime(.012+Math.random()*.008,now+.02);cg.gain.linearRampToValueAtTime(0,now+.12);bp.frequency.value=1200+Math.random()*1500;this.timers.push(setTimeout(pop,200+Math.random()*600))};this.timers.push(setTimeout(pop,500))}
}

const Mn=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
const Sn=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
const XI=({s=24})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const CL=()=><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="15,18 9,12 15,6"/></svg>;
const CR=()=><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="9,18 15,12 9,6"/></svg>;

function LImg({src,alt,className}){
  const[ok,setOk]=useState(false);const[err,setErr]=useState(false);
  return <div className={`relative overflow-hidden ${className}`}>{!ok&&!err&&<div className="absolute inset-0 shim"/>}
    {err?<div className="absolute inset-0 bg-sand flex items-center justify-center"><span className="text-sage font-display text-3xl italic opacity-30">✦</span></div>
    :<img src={src} alt={alt} loading="lazy" onLoad={()=>setOk(true)} onError={()=>setErr(true)} className={`w-full h-full object-cover transition-opacity duration-700 ${ok?'opacity-100':'opacity-0'}`}/>}</div>;
}

function Card({g,saved,onSave,onOpen,i,dk}){
  const h=g.height==='tall'?'h-80':g.height==='medium'?'h-64':'h-52';
  return <div className="masonry-item anim-fu" style={{animationDelay:`${i*50}ms`}}>
    <div className={`card-hover rounded-2xl overflow-hidden cursor-pointer shadow-sm hover:shadow-lg ${dk?'bg-[#242b27]':'bg-white'}`}>
      <div className="relative" onClick={()=>onOpen(g)}>
        {g.video?<div className={`${h} relative vid-card`}><video src={g.video} muted loop autoPlay playsInline className="absolute inset-0 w-full h-full object-cover" poster={g.img}/><div className="absolute top-3 left-3 z-10"><span className="text-[9px] font-body font-semibold uppercase tracking-widest px-2.5 py-1 rounded-full backdrop-blur-md bg-black/20 text-white/90">▶ Video</span></div></div>
        :<LImg src={g.img} alt={g.text} className={h}/>}
        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-black/10 to-transparent"/>
        <div className="absolute bottom-0 left-0 right-0 p-4 pb-5"><p className="font-display text-white text-lg sm:text-xl leading-snug italic" style={{textShadow:'0 1px 12px rgba(0,0,0,.5)'}}>{g.text}</p></div>
      </div>
      <div className={`px-4 py-3 flex items-center justify-between border-t ${dk?'border-[#2F3E35]':'border-sand/60'}`}>
        <div className="flex flex-wrap gap-1.5">{g.categories.slice(0,2).map(c=><span key={c} className={`text-[10px] font-body font-medium tracking-wider uppercase px-2 py-0.5 rounded-full ${dk?'bg-[#2F3E35] text-sage-light':'bg-sand text-sage-dark'}`}>{c}</span>)}</div>
        <button onClick={e=>{e.stopPropagation();onSave(g.id)}} className="p-1.5 rounded-full hover:bg-sand/50 transition-colors duration-300"><Heart f={saved}/></button>
      </div>
    </div>
  </div>;
}

function Modal({g,onClose,saved,onSave,dk}){
  if(!g)return null;
  return <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
    <div className="absolute inset-0 bg-black/50 backdrop-blur-sm anim-fi"/>
    <div className={`relative max-w-lg w-full rounded-3xl overflow-hidden shadow-2xl anim-su max-h-[90vh] overflow-y-auto scrollbar-hide ${dk?'bg-[#242b27]':'bg-white'}`} onClick={e=>e.stopPropagation()}>
      {g.video?<div className="h-56 sm:h-64 relative vid-card"><video src={g.video} muted loop autoPlay playsInline className="absolute inset-0 w-full h-full object-cover" poster={g.img}/></div>:<LImg src={g.img} alt={g.text} className="h-56 sm:h-64"/>}
      <div className="absolute top-3 right-3"><button onClick={onClose} className="bg-white/80 backdrop-blur-sm rounded-full p-2 hover:bg-white transition-colors"><XI s={18}/></button></div>
      <div className="p-6 sm:p-8">
        <h3 className={`font-display text-2xl sm:text-3xl leading-tight mb-4 italic ${dk?'text-sand':'text-forest'}`}>{g.text}</h3>
        <div className={`rounded-2xl p-5 mb-5 ${dk?'bg-[#1a1f1c]':'bg-cream'}`}>
          <p className={`text-xs font-body font-semibold uppercase tracking-widest mb-2 ${dk?'text-sage':'text-sage-dark'}`}>✦ Try This</p>
          <p className={`font-body text-sm leading-relaxed ${dk?'text-[#D4D1CA]':'text-charcoal/80'}`}>{g.prompt}</p>
        </div>
        <div className="flex gap-2 flex-wrap mb-4">{g.categories.map(c=><span key={c} className={`text-xs font-body px-3 py-1 rounded-full ${dk?'bg-[#2F3E35] text-sage-light':'bg-sand text-sage-dark'}`}>{c}</span>)}</div>
        <button onClick={()=>onSave(g.id)} className={`w-full py-3 rounded-xl font-body font-medium text-sm transition-all duration-500 ${saved?'bg-sage text-white hover:bg-sage-dark':dk?'bg-[#2F3E35] text-sage-light hover:bg-sage/40':'bg-sand text-forest hover:bg-sage hover:text-white'}`}>{saved?'♥ Saved to Kit':'♡ Save to My Safety Kit'}</button>
      </div>
    </div>
  </div>;
}

function Drawer({open,onClose,ids,onSave,onBreathe,dk}){
  const sv=GLIMMERS.filter(g=>ids.includes(g.id));
  return <>{open&&<div className="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm" onClick={onClose}/>}
    <div className={`fixed top-0 right-0 bottom-0 z-50 w-full max-w-md shadow-2xl drawer-panel ${dk?'bg-[#1a1f1c]':'bg-alabaster'} ${open?'translate-x-0':'translate-x-full'}`}>
      <div className="h-full flex flex-col">
        <div className={`p-6 flex items-center justify-between border-b ${dk?'border-[#2F3E35]':'border-sand'}`}>
          <div><h2 className={`font-display text-2xl ${dk?'text-sand':'text-forest'}`}>My Safety Kit</h2><p className={`font-body text-xs mt-1 ${dk?'text-sage':'text-sage-dark'}`}>{sv.length} glimmer{sv.length!==1?'s':''}</p></div>
          <button onClick={onClose} className="p-2 rounded-full hover:bg-sand/50 transition-colors"><XI/></button>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-hide p-5 space-y-3">
          {sv.length===0?<div className="flex flex-col items-center justify-center h-full text-center px-6"><span className="text-5xl mb-4 opacity-20">✦</span><p className="font-display text-xl italic text-sage/40">Your kit is empty</p><p className="font-body text-sm mt-2 opacity-30">Tap the heart on any glimmer to save it here.</p></div>
          :sv.map(g=><div key={g.id} className={`flex items-center gap-3 rounded-xl p-3 transition-all ${dk?'bg-[#242b27] hover:bg-[#2F3E35]':'bg-white hover:bg-cream'}`}>
            <LImg src={g.img} alt={g.text} className="w-14 h-14 rounded-lg flex-shrink-0"/><p className={`font-body text-sm flex-1 leading-snug ${dk?'text-sand':'text-charcoal'}`}>{g.text}</p>
            <button onClick={()=>onSave(g.id)} className="p-1.5 flex-shrink-0"><Heart f={true} s={18}/></button></div>)}
        </div>
        {sv.length>0&&<div className={`p-5 border-t ${dk?'border-[#2F3E35]':'border-sand'}`}>
          <button onClick={onBreathe} className="w-full py-3.5 rounded-xl bg-sage text-white font-body font-medium text-sm hover:bg-sage-dark transition-all flex items-center justify-center gap-2">
            <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'white',animation:'bCycle 3s ease-in-out infinite'}}></span> Enter Breathe Mode</button></div>}
      </div>
    </div></>;
}

/* ═══ BREATHE MODE — Dark void, animated text ═══ */
function Breathe({gls,onClose}){
  const[cur,setCur]=useState(0);const g=gls[cur];
  return <div className="fixed inset-0 z-[100] flex items-center justify-center" style={{background:'radial-gradient(ellipse at center, #1a2420 0%, #0d1210 50%, #070a09 100%)'}}>
    <div className="absolute inset-0 overflow-hidden opacity-20">{[...Array(12)].map((_,i)=><div key={i} className="absolute rounded-full bg-sage" style={{width:2+Math.random()*3,height:2+Math.random()*3,left:`${10+Math.random()*80}%`,top:`${10+Math.random()*80}%`,animation:`fA${(i%3)+1} ${15+Math.random()*15}s ease-in-out infinite`,animationDelay:`${i*1.2}s`,opacity:.3+Math.random()*.4}}/>)}</div>
    <button onClick={onClose} className="absolute top-6 right-6 z-10 text-white/30 hover:text-white/70 p-2 transition-colors duration-500"><XI s={28}/></button>
    {gls.length>1&&<><button onClick={()=>setCur(i=>(i-1+gls.length)%gls.length)} className="absolute left-4 top-1/2 -translate-y-1/2 z-10 text-white/20 hover:text-white/60 transition-colors p-2"><CL/></button>
    <button onClick={()=>setCur(i=>(i+1)%gls.length)} className="absolute right-4 top-1/2 -translate-y-1/2 z-10 text-white/20 hover:text-white/60 transition-colors p-2"><CR/></button></>}
    <div className="relative z-10 text-center px-8 max-w-xl breathe-pulse">
      <p className="font-display text-white/90 text-3xl sm:text-5xl leading-relaxed italic mb-8" style={{textShadow:'0 0 40px rgba(141,163,153,.15)'}}>"{g.text}"</p>
      <div className="w-16 h-px bg-sage/30 mx-auto mb-6"/>
      <p className="font-body text-white/40 text-sm sm:text-base leading-relaxed max-w-md mx-auto mb-10">{g.prompt}</p>
      <div className="relative h-8"><p className="bt-in font-body text-sage/70 text-lg tracking-[.3em] uppercase absolute inset-0">Breathe in…</p><p className="bt-out font-body text-sage/70 text-lg tracking-[.3em] uppercase absolute inset-0">Breathe out…</p></div>
    </div>
    <div className="absolute bottom-8 left-0 right-0 flex justify-center gap-2 z-10">{gls.map((_,i)=><button key={i} onClick={()=>setCur(i)} className={`h-1.5 rounded-full transition-all duration-500 ${i===cur?'bg-sage/60 w-6':'bg-white/15 w-1.5'}`}/>)}</div>
  </div>;
}

function Soundbar({dk}){
  const[playing,setPlaying]=useState(null);
  const toggle=n=>{if(playing===n){soundEngine.stop();setPlaying(null)}else{soundEngine._cleanup();soundEngine.play(n);setPlaying(n)}};
  useEffect(()=>()=>{soundEngine.stop()},[]);
  const ic={Rain:'🌧',Forest:'🌿',Ocean:'🌊',Static:'📻'};
  return <div className={`fixed bottom-0 left-0 right-0 z-30 backdrop-blur-xl border-t ${dk?'bg-[#1a1f1c]/90 border-[#2F3E35]':'bg-alabaster/90 border-sand'}`}>
    <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <div className="flex items-center gap-2"><div className={`sb-anim flex items-end h-4 ${playing?'on':''} ${dk?'text-sage':'text-sage-dark'}`}><span/><span/><span/><span/></div>
        <span className={`font-body text-[10px] tracking-wider uppercase hidden sm:inline ${dk?'text-sage/60':'text-sage-dark/50'}`}>{playing?`Playing: ${playing}`:'Soundscape'}</span></div>
      <div className="flex gap-2">{Object.keys(ic).map(n=><button key={n} onClick={()=>toggle(n)} className={`soundbar-btn px-3 sm:px-4 py-2 rounded-full font-body text-xs font-medium ${playing===n?'bg-sage text-white shadow-md':dk?'bg-[#242b27] text-sand hover:bg-[#2F3E35]':'bg-sand text-charcoal hover:bg-sand-dark'}`}>{ic[n]}<span className="hidden sm:inline ml-1">{n}</span></button>)}</div>
    </div>
  </div>;
}

function App(){
  const[dk,setDk]=useState(()=>localStorage.getItem('glimmer-dark')==='true');
  const[ids,setIds]=useState(()=>{try{return JSON.parse(localStorage.getItem('glimmer-saved'))||[]}catch{return[]}});
  const[af,setAf]=useState(null);const[mg,setMg]=useState(null);const[dr,setDr]=useState(false);const[bm,setBm]=useState(false);
  useEffect(()=>{localStorage.setItem('glimmer-saved',JSON.stringify(ids))},[ids]);
  useEffect(()=>{localStorage.setItem('glimmer-dark',dk);document.body.classList.toggle('dark-mode',dk)},[dk]);
  const ts=useCallback(id=>{setIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])},[]);
  const fl=useMemo(()=>af?GLIMMERS.filter(g=>g.categories.includes(af)):GLIMMERS,[af]);
  const sg=useMemo(()=>GLIMMERS.filter(g=>ids.includes(g.id)),[ids]);
  return <div className="relative z-10 min-h-screen pb-20 transition-colors duration-700">
    <header><div className="max-w-6xl mx-auto px-5 pt-10 pb-6 sm:pt-14 sm:pb-8">
      <div className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
        <div><div className="flex items-center gap-3 mb-1"><div className={`w-2 h-2 rounded-full ${dk?'bg-sage/60':'bg-sage'}`} style={{animation:'bCycle 4s ease-in-out infinite'}}/><span className={`font-body text-[10px] uppercase tracking-[.3em] ${dk?'text-sage/50':'text-sage-dark/50'}`}>A digital sanctuary</span></div>
          <h1 className={`font-display text-4xl sm:text-5xl lg:text-6xl font-light tracking-tight italic ${dk?'text-sand':'text-forest'}`}>The Glimmer Archive</h1>
          <p className={`font-body text-sm sm:text-base mt-2 font-light tracking-wide ${dk?'text-sage-light/50':'text-sage-dark/70'}`}>Micro-moments of safety for your nervous system.</p></div>
        <button onClick={()=>setDk(!dk)} className={`flex items-center gap-2 px-4 py-2 rounded-full font-body text-xs font-medium tracking-wider uppercase self-start transition-all duration-500 ${dk?'bg-[#2F3E35] text-sage-light hover:bg-sage/30':'bg-sand text-charcoal hover:bg-sand-dark'}`}>{dk?<Sn/>:<Mn/>}{dk?'Day':'Night'}</button>
      </div>
    </div></header>
    <div className="max-w-6xl mx-auto px-5 mb-8"><div className="flex flex-wrap gap-2 items-center">
      <span className={`font-body text-[10px] uppercase tracking-widest mr-1 ${dk?'text-sage/40':'text-sage-dark/40'}`}>Senses</span>
      {CAT_S.map(c=><button key={c} onClick={()=>setAf(af===c?null:c)} className={`filter-pill px-3.5 py-1.5 rounded-full font-body text-xs font-medium ${af===c?'bg-sage text-white shadow-md':dk?'bg-[#242b27] text-[#D4D1CA] hover:bg-[#2F3E35]':'bg-sand text-charcoal hover:bg-sand-dark'}`}>{c}</button>)}
      <span className={`font-body text-[10px] uppercase tracking-widest ml-2 mr-1 ${dk?'text-sage/40':'text-sage-dark/40'}`}>Vibes</span>
      {CAT_V.map(c=><button key={c} onClick={()=>setAf(af===c?null:c)} className={`filter-pill px-3.5 py-1.5 rounded-full font-body text-xs font-medium ${af===c?'bg-sage text-white shadow-md':dk?'bg-[#242b27] text-[#D4D1CA] hover:bg-[#2F3E35]':'bg-sand text-charcoal hover:bg-sand-dark'}`}>{c}</button>)}
      {af&&<button onClick={()=>setAf(null)} className={`filter-pill px-3.5 py-1.5 rounded-full font-body text-xs font-medium border ${dk?'border-sage/30 text-sage hover:bg-sage/10':'border-sage/30 text-sage-dark hover:bg-sage/10'}`}>✕ Reset</button>}
    </div></div>
    <main className="max-w-6xl mx-auto px-5"><div className="masonry" key={af||'all'}>{fl.map((g,i)=><Card key={g.id} g={g} i={i} saved={ids.includes(g.id)} onSave={ts} onOpen={setMg} dk={dk}/>)}</div>
      {fl.length===0&&<div className="text-center py-20"><p className="font-display text-2xl italic text-sage/30">No glimmers here yet…</p></div>}</main>
    <button onClick={()=>setDr(true)} className="fixed bottom-16 right-5 z-30 bg-forest text-white px-5 py-3.5 rounded-2xl shadow-xl hover:shadow-2xl font-body text-sm font-medium transition-all duration-500 hover:scale-105 flex items-center gap-2" style={{boxShadow:'0 8px 30px -4px rgba(47,62,53,.4)'}}>
      <Heart f={true} s={16}/> My Kit {ids.length>0&&<span className="bg-sage px-2 py-0.5 rounded-full text-xs">{ids.length}</span>}</button>
    {mg&&<Modal g={mg} onClose={()=>setMg(null)} saved={ids.includes(mg.id)} onSave={ts} dk={dk}/>}
    <Drawer open={dr} onClose={()=>setDr(false)} ids={ids} onSave={ts} onBreathe={()=>{setDr(false);setBm(true)}} dk={dk}/>
    {bm&&sg.length>0&&<Breathe gls={sg} onClose={()=>setBm(false)}/>}
    <Soundbar dk={dk}/>
  </div>;
}

// 1. Start the React App
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// 2. Register the Service Worker (REQUIRED for PWA Install Button)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW Registered!', reg))
      .catch(err => console.log('SW Failed', err));
  });
}
